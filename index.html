<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atatürk Cd. Fire Takip V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .autocomplete-items { position: absolute; border: 1px solid #e5e7eb; z-index: 99; top: 100%; left: 0; right: 0; background: white; border-radius: 1.5rem; max-height: 200px; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .autocomplete-item { padding: 14px; cursor: pointer; font-size: 13px; font-weight: 700; border-bottom: 1px solid #f3f4f6; }
        .bar-transition { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <div id="app" class="max-w-xl mx-auto p-4 md:p-6 space-y-6">
        <div class="flex justify-between items-start px-2 mt-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 uppercase leading-none">ATATÜRK CD.</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mt-1">Gelişmiş İzleme Sistemi</p>
            </div>
            <div class="text-right">
                <span id="unregistered-total" class="text-2xl font-black text-orange-600 tabular-nums">0.00₺</span>
                <p class="text-[9px] font-black text-gray-400 uppercase mt-1">Bekleyen</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 p-6 relative">
            <form id="fire-form" class="space-y-3" autocomplete="off">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-2 gap-2 relative">
                    <div class="relative">
                        <input type="text" id="productName" placeholder="Ürün Adı" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500 transition-all" required>
                        <div id="autocomplete-list" class="autocomplete-items hidden no-scrollbar"></div>
                    </div>
                    <input type="text" id="code" placeholder="Kod" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500 transition-all" required>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <select id="unitType" class="bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                        <option value="gram">KG / GR</option>
                        <option value="Adet">ADET</option>
                    </select>
                    <input type="number" id="amount" step="0.001" inputmode="decimal" placeholder="Miktar" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-bold" required>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <input type="number" step="0.01" id="unitPrice" placeholder="Birim Fiyat" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-black text-blue-600" required>
                    <select id="kdv" class="bg-gray-50 p-4 rounded-2xl font-black text-orange-600 outline-none">
                        <option value="1">%1</option>
                        <option value="10">%10</option>
                        <option value="20">%20</option>
                    </select>
                </div>

                <select id="category" class="w-full bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                    <option value="Kırmızı Et">Kırmızı Et</option>
                    <option value="Tavuk">Tavuk</option>
                    <option value="SKT">SKT Ürün</option>
                    <option value="Mağaza">Mağaza</option>
                    <option value="Spot">Spot</option>
                    <option value="Meyve Sebze">Meyve Sebze</option>
                </select>

                <button type="submit" id="submit-btn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-lg uppercase text-sm">LİSTEYE EKLE</button>
                <button type="button" id="cancel-btn" class="hidden w-full py-2 text-[10px] font-black text-gray-400 uppercase">VAZGEÇ</button>
            </form>
        </div>

        <div id="pending-section" class="space-y-4">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2">Bekleyen Kayıtlar</h2>
            <div id="unregistered-list" class="space-y-3"></div>
            
            <div id="pending-analysis" class="hidden bg-orange-50 rounded-[2rem] p-5 border border-orange-100 space-y-3">
                <h4 class="text-[9px] font-black text-orange-400 uppercase tracking-widest">Bekleyen Grup Dağılımı</h4>
                <div id="unregistered-category-stats" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div id="register-all-container" class="hidden">
                <button onclick="registerAll()" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-sm tracking-widest uppercase shadow-xl shadow-orange-100 flex justify-center items-center gap-3">
                    ARŞİVE GÖNDER <span id="pending-count" class="bg-orange-600 px-2 py-0.5 rounded-lg text-[10px]">0</span>
                </button>
            </div>
        </div>

        <div id="archive-section" class="pt-6 space-y-4 hidden border-t border-gray-100">
            <div class="bg-white rounded-[2rem] p-4 shadow-sm space-y-3">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Arşiv Filtreleri</h2>
                    <div class="flex bg-gray-100 p-1 rounded-xl text-[9px] font-black">
                        <button onclick="setFilter('all')" id="filter-all" class="px-3 py-1.5 rounded-lg bg-white shadow-sm transition-all">HEPSİ</button>
                        <button onclick="setFilter('today')" id="filter-today" class="px-3 py-1.5 rounded-lg text-gray-400 transition-all">BUGÜN</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="start-date" class="bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-blue-300">
                    <input type="date" id="end-date" class="bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-blue-300">
                </div>
                <input type="text" id="search-archive" placeholder="Ürün veya kod ara..." class="w-full bg-gray-50 rounded-xl px-4 py-3 text-xs font-bold outline-none border border-transparent focus:border-blue-300">
            </div>
            
            <div id="registered-list" class="space-y-2"></div>

            <div class="bg-slate-900 rounded-[2.5rem] p-7 text-white space-y-6 shadow-2xl">
                <div>
                    <p id="analysis-title" class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Filtrelenmiş Toplam</p>
                    <h3 id="archive-total" class="text-3xl font-black tabular-nums">0.00₺</h3>
                </div>
                <div id="chart-container" class="space-y-4 pt-2"></div>
            </div>
        </div>

        <footer class="py-12 text-center opacity-20 hover:opacity-100 transition-opacity">
            <p class="text-[8px] font-black text-gray-400 uppercase tracking-[0.5em] cursor-pointer" onclick="resetSystem()">SIFIRLA: 2407</p>
        </footer>
    </div>

    <script>
        let fires = JSON.parse(localStorage.getItem('fireRecords')) || [];
        let currentFilter = 'all';
        let searchTerm = '';

        function init() { 
            setupAutocomplete(); 
            setupDateFilters();
            render(); 
        }

        function calculateTotal(amount, price, kdv, unit) {
            const amt = parseFloat(amount) || 0;
            const prc = parseFloat(price) || 0;
            const rate = parseFloat(kdv);
            const baseValue = unit === 'gram' ? (amt / 1000) * prc : amt * prc;
            return (baseValue / (1 + rate / 100)).toFixed(2);
        }

        function setupDateFilters() {
            const startInput = document.getElementById('start-date');
            const endInput = document.getElementById('end-date');
            [startInput, endInput].forEach(el => el.addEventListener('change', () => {
                currentFilter = 'range';
                document.getElementById('filter-all').className = 'px-3 py-1.5 rounded-lg text-gray-400';
                document.getElementById('filter-today').className = 'px-3 py-1.5 rounded-lg text-gray-400';
                render();
            }));
        }

        function setupAutocomplete() {
            const input = document.getElementById('productName');
            const list = document.getElementById('autocomplete-list');
            input.addEventListener('input', function() {
                const val = this.value.toLowerCase();
                list.innerHTML = '';
                if (!val) { list.classList.add('hidden'); return; }
                const library = Array.from(new Set(fires.map(f => f.productName))).map(name => fires.find(f => f.productName === name));
                const matches = library.filter(f => f.productName.toLowerCase().includes(val)).slice(0, 5);
                if (matches.length > 0) {
                    matches.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        div.innerHTML = `<span>${m.productName}</span> <span class="text-[10px] text-gray-300 float-right font-black uppercase">${m.code}</span>`;
                        div.onclick = () => {
                            input.value = m.productName;
                            document.getElementById('code').value = m.code;
                            document.getElementById('unitPrice').value = m.unitPrice;
                            document.getElementById('kdv').value = m.kdv;
                            document.getElementById('category').value = m.category;
                            document.getElementById('unitType').value = m.unitType;
                            list.classList.add('hidden');
                        };
                        list.appendChild(div);
                    });
                    list.classList.remove('hidden');
                } else list.classList.add('hidden');
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            document.getElementById('filter-all').className = filter === 'all' ? 'px-3 py-1.5 rounded-lg bg-white shadow-sm' : 'px-3 py-1.5 rounded-lg text-gray-400';
            document.getElementById('filter-today').className = filter === 'today' ? 'px-3 py-1.5 rounded-lg bg-white shadow-sm' : 'px-3 py-1.5 rounded-lg text-gray-400';
            render();
        }

        document.getElementById('fire-form').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const now = new Date();
            const formData = {
                code: document.getElementById('code').value.trim().toUpperCase(),
                productName: document.getElementById('productName').value.trim(),
                unitType: document.getElementById('unitType').value,
                amount: document.getElementById('amount').value,
                unitPrice: document.getElementById('unitPrice').value,
                kdv: document.getElementById('kdv').value,
                category: document.getElementById('category').value,
                fullDate: now.toISOString().split('T')[0],
                time: now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
            };

            const totalValue = calculateTotal(formData.amount, formData.unitPrice, formData.kdv, formData.unitType);

            if (editId) {
                const index = fires.findIndex(f => f.id === editId);
                fires[index] = { ...fires[index], ...formData, total: totalValue };
                document.getElementById('edit-id').value = '';
                document.getElementById('submit-btn').innerText = 'LİSTEYE EKLE';
            } else {
                fires.push({
                    id: Date.now().toString(),
                    ...formData,
                    total: totalValue,
                    status: 'unregistered',
                    history: []
                });
            }
            saveAndRender();
            e.target.reset();
        };

        function registerAll() {
            fires.filter(f => f.status === 'unregistered').forEach(item => {
                const existing = fires.find(r => r.status === 'registered' && r.code === item.code && r.category === item.category);
                const historyEntry = { 
                    date: new Date().toLocaleDateString('tr-TR'), 
                    time: item.time,
                    amount: item.amount, 
                    unitType: item.unitType, 
                    total: item.total 
                };

                if (existing) {
                    existing.amount = (parseFloat(existing.amount) + parseFloat(item.amount)).toFixed(3);
                    existing.total = (parseFloat(existing.total) + parseFloat(item.total)).toFixed(2);
                    existing.history.push(historyEntry);
                    item.status = 'to_delete';
                } else {
                    item.status = 'registered';
                    item.history = [historyEntry];
                }
            });
            fires = fires.filter(f => f.status !== 'to_delete');
            saveAndRender();
        }

        function saveAndRender() { localStorage.setItem('fireRecords', JSON.stringify(fires)); render(); }

        function render() {
            const unregistered = fires.filter(f => f.status === 'unregistered');
            const startVal = document.getElementById('start-date').value;
            const endVal = document.getElementById('end-date').value;
            const todayStr = new Date().toISOString().split('T')[0];

            let registered = fires.filter(f => f.status === 'registered');

            // Gelişmiş Filtreleme
            if (currentFilter === 'today') registered = registered.filter(f => f.fullDate === todayStr);
            else if (currentFilter === 'range' && startVal && endVal) {
                registered = registered.filter(f => f.fullDate >= startVal && f.fullDate <= endVal);
            }
            if (searchTerm) registered = registered.filter(f => f.productName.toLowerCase().includes(searchTerm) || f.code.toLowerCase().includes(searchTerm));

            // Bekleyenler Render
            document.getElementById('unregistered-list').innerHTML = unregistered.map(item => `
                <div class="bg-white p-4 rounded-3xl border border-gray-100 flex justify-between items-center animate-in shadow-sm">
                    <div>
                        <span class="text-[7px] font-black text-orange-500 bg-orange-50 px-2 py-0.5 rounded uppercase">${item.category}</span>
                        <h3 class="font-black text-gray-800 text-xs mt-1 uppercase">${item.productName}</h3>
                        <p class="text-[9px] text-gray-400 font-bold">${item.amount} ${item.unitType === 'gram' ? 'Kg' : 'Ad'} • ${item.time}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm text-gray-900">${item.total}₺</p>
                        <button onclick="deleteRecord('${item.id}')" class="text-[10px] text-red-300 font-black uppercase">SİL</button>
                    </div>
                </div>
            `).join('');

            // Bekleyen Grup Analizi
            const pCatTotals = {};
            unregistered.forEach(i => pCatTotals[i.category] = (pCatTotals[i.category] || 0) + parseFloat(i.total));
            document.getElementById('pending-analysis').className = unregistered.length > 0 ? 'bg-orange-50 rounded-[2rem] p-5 border border-orange-100 space-y-3' : 'hidden';
            document.getElementById('unregistered-category-stats').innerHTML = Object.entries(pCatTotals).map(([cat, val]) => `
                <div class="bg-white/60 p-3 rounded-2xl flex justify-between items-center border border-orange-100">
                    <span class="text-[8px] font-black text-orange-900 uppercase">${cat}</span>
                    <span class="text-xs font-black text-orange-600">${val.toFixed(2)}₺</span>
                </div>
            `).join('');

            const uTotal = unregistered.reduce((acc, curr) => acc + parseFloat(curr.total), 0).toFixed(2);
            document.getElementById('unregistered-total').innerText = uTotal + '₺';
            document.getElementById('pending-count').innerText = unregistered.length;
            document.getElementById('register-all-container').style.display = unregistered.length > 0 ? 'block' : 'none';

            // Arşiv Render
            document.getElementById('archive-section').style.display = fires.some(f => f.status === 'registered') ? 'block' : 'none';
            document.getElementById('registered-list').innerHTML = registered.map(item => `
                <div onclick="toggleAccordion('${item.id}')" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm cursor-pointer animate-in">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[7px] font-black text-gray-300 uppercase">${item.code} • ${item.category}</span>
                            <p class="font-black text-gray-700 text-xs uppercase">${item.productName}</p>
                        </div>
                        <div class="text-right">
                            <span class="font-black text-gray-900 text-xs">${item.total}₺</span>
                            <p class="text-[8px] text-gray-400 font-bold uppercase">${item.amount} Toplam</p>
                        </div>
                    </div>
                    <div id="acc-${item.id}" class="hidden mt-3 pt-3 border-t border-dashed border-gray-100 space-y-2">
                        <p class="text-[7px] font-black text-blue-500 uppercase tracking-widest mb-1">Geçmiş Girişler</p>
                        ${item.history.map(h => `
                            <div class="flex justify-between text-[9px] font-bold bg-gray-50 p-2 rounded-lg">
                                <span class="text-gray-400">${h.date} <span class="text-[7px] opacity-50">${h.time || ''}</span></span>
                                <span class="text-gray-600">${h.amount} ${h.unitType === 'gram' ? 'Kg' : 'Ad'}</span>
                                <span class="text-slate-900">${h.total}₺</span>
                            </div>
                        `).sort((a,b) => b.timestamp - a.timestamp).join('')}
                    </div>
                </div>
            `).join('');

            // Grafik ve Toplam
            const rCatTotals
