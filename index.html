<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atatürk Cd. Fire Takip V7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #reader { width: 100%; border-radius: 1.5rem; overflow: hidden; border: none !important; }
        #reader__dashboard_section_csr button { background: #1e293b !important; color: white !important; border-radius: 0.5rem; padding: 5px 10px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .autocomplete-items { position: absolute; border: 1px solid #e5e7eb; z-index: 99; top: 100%; left: 0; right: 0; background: white; border-radius: 1rem; max-height: 180px; overflow-y: auto; box-shadow: 0 15px 25px -5px rgba(0,0,0,0.1); }
        .autocomplete-item { padding: 12px; cursor: pointer; font-size: 13px; font-weight: 700; border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <div id="app" class="max-w-xl mx-auto p-4 md:p-6 space-y-6">
        <div class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 uppercase">ATATÜRK CD.</h1>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">KAREKOD DESTEĞİ V7.0</p>
            </div>
            <div class="text-right">
                <span id="unregistered-total" class="text-2xl font-black text-orange-600">0.00₺</span>
                <p class="text-[8px] font-black text-gray-400 uppercase tracking-tighter">BEKLEYEN YÜK</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-gray-100 p-2">
            <div id="reader"></div>
            <div id="scanner-status" class="text-center py-2 text-[10px] font-bold text-gray-400 uppercase">KAREKOD TARAMAYA HAZIR</div>
        </div>

        <div id="form-top" class="bg-white rounded-[2.5rem] shadow-xl p-6 border border-gray-100">
            <form id="fire-form" class="space-y-3" autocomplete="off">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-2 relative">
                    <div class="relative">
                        <input type="text" id="productName" placeholder="Ürün Adı" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                        <div id="autocomplete-list" class="autocomplete-items hidden"></div>
                    </div>
                    <input type="text" id="code" placeholder="Ürün Kodu" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <select id="unitType" class="bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                        <option value="gram">KG / GR</option>
                        <option value="Adet">ADET</option>
                    </select>
                    <input type="number" id="amount" step="0.001" inputmode="decimal" placeholder="Miktar" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" step="0.01" id="unitPrice" placeholder="Birim Fiyat" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-black text-blue-600 border-2 border-transparent focus:border-blue-500" required>
                    <select id="kdv" class="bg-gray-50 p-4 rounded-2xl font-black text-orange-600 outline-none">
                        <option value="1">%1</option>
                        <option value="10">%10</option>
                        <option value="20">%20</option>
                    </select>
                </div>
                <select id="category" class="w-full bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                    <option value="Mağaza">Mağaza</option>
                    <option value="Kırmızı Et">Kırmızı Et</option>
                    <option value="Tavuk">Tavuk</option>
                    <option value="SKT">SKT Ürün</option>
                    <option value="Spot">Spot</option>
                    <option value="Meyve Sebze">Meyve Sebze</option>
                </select>
                <button type="submit" id="submit-btn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black tracking-widest shadow-lg uppercase text-sm">LİSTEYE EKLE</button>
                <button type="button" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden w-full py-2 text-xs font-bold text-red-500 uppercase">VAZGEÇ</button>
            </form>
        </div>

        <div id="pending-container" class="space-y-4">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 flex items-center gap-2">
                <span class="w-2 h-2 bg-orange-500 rounded-full"></span> Onay Bekleyenler
            </h2>
            <div id="unregistered-list" class="space-y-3"></div>
            <div id="pending-analysis" class="hidden bg-orange-50 rounded-[2rem] p-5 border border-orange-100">
                <div id="unregistered-category-stats" class="grid grid-cols-2 gap-2"></div>
            </div>
            <button id="register-all-btn" onclick="registerAll()" class="hidden w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-sm uppercase shadow-xl">HEPSİNİ ONAYLA</button>
        </div>

        <div id="archive-section" class="pt-8 space-y-4 border-t border-gray-200">
            <div id="registered-list" class="space-y-2"></div>
            <div class="bg-slate-900 rounded-[2.5rem] p-7 text-white shadow-2xl">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">ARŞİV TOPLAM</p>
                <h3 id="archive-total" class="text-3xl font-black tabular-nums">0.00₺</h3>
                <div id="chart-container" class="mt-4 space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let fires = JSON.parse(localStorage.getItem('fireRecords')) || [];
        
        // --- TARAYICI AYARLARI ---
        function onScanSuccess(decodedText) {
            // Kodun içindeki gereksiz boşlukları temizle
            const cleanCode = decodedText.trim();
            document.getElementById('code').value = cleanCode;
            document.getElementById('scanner-status').innerText = "OKUNDU: " + cleanCode;
            document.getElementById('scanner-status').className = "text-center py-2 text-[10px] font-bold text-green-500 uppercase";

            // Eğer bu kodla daha önce ürün girildiyse otomatik doldur
            const existingProduct = fires.find(f => f.code === cleanCode);
            if (existingProduct) {
                document.getElementById('productName').value = existingProduct.productName;
                document.getElementById('unitPrice').value = existingProduct.unitPrice;
                document.getElementById('kdv').value = existingProduct.kdv;
                document.getElementById('category').value = existingProduct.category;
                document.getElementById('unitType').value = existingProduct.unitType;
                
                // Miktara odaklan
                document.getElementById('amount').focus();
                
                // Başarı bildirimi için sesi/titreşimi simüle et
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // --- SİSTEM FONKSİYONLARI ---
        window.onload = () => { render(); setupAutocomplete(); };

        function calculateTotal(amount, price, kdv, unit) {
            const amt = parseFloat(amount) || 0;
            const prc = parseFloat(price) || 0;
            const rate = parseFloat(kdv);
            const baseValue = unit === 'gram' ? (amt / 1000) * prc : amt * prc;
            return (baseValue / (1 + rate / 100)).toFixed(2);
        }

        document.getElementById('fire-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const now = new Date();
            
            const itemData = {
                id: editId || Date.now().toString(),
                code: document.getElementById('code').value.trim(),
                productName: document.getElementById('productName').value.trim(),
                unitType: document.getElementById('unitType').value,
                amount: document.getElementById('amount').value,
                unitPrice: document.getElementById('unitPrice').value,
                kdv: document.getElementById('kdv').value,
                category: document.getElementById('category').value,
                fullDate: now.toISOString().split('T')[0],
                time: now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                status: 'unregistered'
            };
            itemData.total = calculateTotal(itemData.amount, itemData.unitPrice, itemData.kdv, itemData.unitType);

            if (editId) {
                const idx = fires.findIndex(f => f.id === editId);
                if (idx !== -1) { itemData.status = fires[idx].status; fires[idx] = itemData; }
                cancelEdit();
            } else {
                fires.unshift(itemData);
            }
            
            localStorage.setItem('fireRecords', JSON.stringify(fires));
            render();
            this.reset();
            document.getElementById('scanner-status').innerText = "KAREKOD TARAMAYA HAZIR";
            document.getElementById('scanner-status').className = "text-center py-2 text-[10px] font-bold text-gray-400 uppercase";
        });

        function render() {
            const unregistered = fires.filter(f => f.status === 'unregistered');
            const registered = fires.filter(f => f.status === 'registered');

            // Bekleyenler
            const unregList = document.getElementById('unregistered-list');
            unregList.innerHTML = unregistered.map(item => `
                <div class="bg-white p-4 rounded-3xl border border-gray-100 flex justify-between items-center shadow-sm animate-in">
                    <div>
                        <span class="text-[7px] font-black text-orange-500 bg-orange-50 px-2 py-0.5 rounded uppercase">${item.category}</span>
                        <h3 class="font-black text-gray-800 text-xs mt-1 uppercase">${item.productName}</h3>
                        <p class="text-[9px] text-gray-400 font-bold">${item.amount} ${item.unitType === 'gram' ? 'KG/GR' : 'ADET'} • ${item.unitPrice}₺/Brm</p>
                    </div>
                    <div class="text-right flex items-center gap-3">
                        <p class="font-black text-sm text-gray-900">${item.total}₺</p>
                        <div class="flex flex-col gap-2 border-l border-gray-100 pl-3">
                            <button onclick="editItem('${item.id}')" class="text-blue-500 text-xs">✏️</button>
                            <button onclick="deleteRecord('${item.id}')" class="text-red-300 text-xs">✕</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('unregistered-total').innerText = unregistered.reduce((a, b) => a + parseFloat(b.total), 0).toFixed(2) + '₺';
            document.getElementById('register-all-btn').classList.toggle('hidden', unregistered.length === 0);
            document.getElementById('pending-analysis').classList.toggle('hidden', unregistered.length === 0);

            // Arşiv
            const regList = document.getElementById('registered-list');
            regList.innerHTML = registered.slice(0, 20).map(item => `
                <div class="bg-white p-3 rounded-2xl border border-gray-100 flex justify-between items-center opacity-80">
                    <div class="flex flex-col">
                        <span class="text-[7px] font-black text-gray-400 uppercase">${item.category} / ${item.fullDate}</span>
                        <h4 class="font-bold text-gray-700 text-[11px] uppercase">${item.productName}</h4>
                        <p class="text-[8px] font-bold text-gray-400">${item.amount}${item.unitType === 'gram' ? 'kg' : 'ad'} x ${item.unitPrice}₺</p>
                    </div>
                    <p class="font-black text-xs text-slate-700">${item.total}₺</p>
                </div>
            `).join('');

            const total = registered.reduce((a, b) => a + parseFloat(b.total), 0);
            document.getElementById('archive-total').innerText = total.toFixed(2) + '₺';
        }

        // Diğer Fonksiyonlar (Önceki sürümlerle aynı)
        function registerAll() { fires = fires.map(f => f.status === 'unregistered' ? {...f, status: 'registered'} : f); localStorage.setItem('fireRecords', JSON.stringify(fires)); render(); }
        function deleteRecord(id) { if(confirm('Silinsin mi?')) { fires = fires.filter(f => f.id !== id); localStorage.setItem('fireRecords', JSON.stringify(fires)); render(); } }
        function editItem(id) {
            const item = fires.find(f => f.id === id);
            document.getElementById('edit-id').value = item.id;
            document.getElementById('productName').value = item.productName;
            document.getElementById('code').value = item.code;
            document.getElementById('amount').value = item.amount;
            document.getElementById('unitPrice').value = item.unitPrice;
            document.getElementById('category').value = item.category;
            document.getElementById('submit-btn').innerText = 'GÜNCELLE';
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
        }
        function cancelEdit() { document.getElementById('fire-form').reset(); document.getElementById('edit-id').value = ''; document.getElementById('submit-btn').innerText = 'LİSTEYE EKLE'; document.getElementById('cancel-edit-btn').classList.add('hidden'); }
    </script>
</body>
</html>
