<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atatürk Cd. Fire Takip V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .autocomplete-items { position: absolute; border: 1px solid #e5e7eb; z-index: 99; top: 100%; left: 0; right: 0; background: white; border-radius: 1rem; max-height: 180px; overflow-y: auto; box-shadow: 0 15px 25px -5px rgba(0,0,0,0.1); }
        .autocomplete-item { padding: 12px; cursor: pointer; font-size: 13px; font-weight: 700; border-bottom: 1px solid #f3f4f6; }
        .bar-transition { transition: width 0.8s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <div id="app" class="max-w-xl mx-auto p-4 md:p-6 space-y-6">
        <div class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 uppercase">ATATÜRK CD.</h1>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Profesyonel Fire Takibi</p>
            </div>
            <div class="text-right">
                <span id="unregistered-total" class="text-2xl font-black text-orange-600">0.00₺</span>
                <p class="text-[8px] font-black text-gray-400 uppercase">BEKLEYEN TOPLAM</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl p-6 relative border border-gray-100">
            <form id="fire-form" class="space-y-3" autocomplete="off">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-2 gap-2 relative">
                    <div class="relative">
                        <input type="text" id="productName" placeholder="Ürün Adı" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                        <div id="autocomplete-list" class="autocomplete-items hidden no-scrollbar"></div>
                    </div>
                    <input type="text" id="code" placeholder="Kod" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <select id="unitType" class="bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                        <option value="gram">KG / GR</option>
                        <option value="Adet">ADET</option>
                    </select>
                    <input type="number" id="amount" step="0.001" inputmode="decimal" placeholder="Miktar" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm" required>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <input type="number" step="0.01" id="unitPrice" placeholder="Fiyat" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-black text-blue-600" required>
                    <select id="kdv" class="bg-gray-50 p-4 rounded-2xl font-black text-orange-600 outline-none">
                        <option value="1">%1</option>
                        <option value="10">%10</option>
                        <option value="20">%20</option>
                    </select>
                </div>

                <select id="category" class="w-full bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                    <option value="Kırmızı Et">Kırmızı Et</option>
                    <option value="Tavuk">Tavuk</option>
                    <option value="SKT">SKT Ürün</option>
                    <option value="Mağaza">Mağaza</option>
                    <option value="Spot">Spot</option>
                    <option value="Meyve Sebze">Meyve Sebze</option>
                </select>

                <button type="submit" id="submit-btn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-lg uppercase text-sm">
                    LİSTEYE EKLE
                </button>
            </form>
        </div>

        <div id="pending-container" class="space-y-4 pt-2">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 flex items-center gap-2">
                <span class="w-2 h-2 bg-orange-500 rounded-full animate-pulse"></span>
                Bekleyen Kayıtlar
            </h2>
            <div id="unregistered-list" class="space-y-3 min-h-[50px]">
                </div>
            
            <div id="pending-analysis" class="hidden bg-orange-50 rounded-[2rem] p-5 border border-orange-100 space-y-3">
                <h4 class="text-[9px] font-black text-orange-400 uppercase tracking-widest">Bekleyen Grup Analizi</h4>
                <div id="unregistered-category-stats" class="grid grid-cols-2 gap-2"></div>
            </div>

            <button id="register-all-btn" onclick="registerAll()" class="hidden w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-sm tracking-widest uppercase shadow-xl shadow-orange-100 active:scale-95">
                HEPSİNİ ONAYLA VE ARŞİVE AT
            </button>
        </div>

        <div id="archive-section" class="pt-8 space-y-4 hidden border-t border-gray-200">
            <div class="bg-white rounded-[2rem] p-5 shadow-sm space-y-3 border border-gray-100">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Kalıcı Arşiv</h2>
                    <div class="flex bg-gray-100 p-1 rounded-xl text-[9px] font-black">
                        <button onclick="setFilter('all')" id="filter-all" class="px-3 py-1.5 rounded-lg bg-white shadow-sm">HEPSİ</button>
                        <button onclick="setFilter('today')" id="filter-today" class="px-3 py-1.5 rounded-lg text-gray-400">BUGÜN</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="start-date" class="bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-blue-300">
                    <input type="date" id="end-date" class="bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-blue-300">
                </div>
            </div>
            
            <div id="registered-list" class="space-y-2"></div>

            <div class="bg-slate-900 rounded-[2.5rem] p-7 text-white space-y-6 shadow-2xl">
                <div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">ARŞİV TOPLAMI</p>
                    <h3 id="archive-total" class="text-3xl font-black tabular-nums">0.00₺</h3>
                </div>
                <div id="chart-container" class="space-y-4 pt-2"></div>
            </div>
        </div>

        <footer class="py-12 text-center opacity-10">
            <p class="text-[8px] font-black tracking-[0.5em] cursor-pointer" onclick="resetSystem()">SIFIRLA: 2407</p>
        </footer>
    </div>

    <script>
        let fires = JSON.parse(localStorage.getItem('fireRecords')) || [];
        let currentFilter = 'all';

        function init() { 
            setupAutocomplete(); 
            setupDateFilters();
            render(); 
        }

        function calculateTotal(amount, price, kdv, unit) {
            const amt = parseFloat(amount) || 0;
            const prc = parseFloat(price) || 0;
            const rate = parseFloat(kdv);
            const baseValue = unit === 'gram' ? (amt / 1000) * prc : amt * prc;
            return (baseValue / (1 + rate / 100)).toFixed(2);
        }

        function setupDateFilters() {
            const startInput = document.getElementById('start-date');
            const endInput = document.getElementById('end-date');
            [startInput, endInput].forEach(el => el.addEventListener('change', () => {
                currentFilter = 'range';
                render();
            }));
        }

        function setupAutocomplete() {
            const input = document.getElementById('productName');
            const list = document.getElementById('autocomplete-list');
            input.addEventListener('input', function() {
                const val = this.value.toLowerCase();
                list.innerHTML = '';
                if (!val) { list.classList.add('hidden'); return; }
                const library = Array.from(new Set(fires.map(f => f.productName))).map(name => fires.find(f => f.productName === name));
                const matches = library.filter(f => f.productName.toLowerCase().includes(val)).slice(0, 5);
                if (matches.length > 0) {
                    matches.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        div.innerHTML = `<span>${m.productName}</span> <span class="text-[10px] text-gray-300 float-right uppercase font-black">${m.code}</span>`;
                        div.onclick = () => {
                            input.value = m.productName;
                            document.getElementById('code').value = m.code;
                            document.getElementById('unitPrice').value = m.unitPrice;
                            document.getElementById('kdv').value = m.kdv;
                            document.getElementById('category').value = m.category;
                            document.getElementById('unitType').value = m.unitType;
                            list.classList.add('hidden');
                        };
                        list.appendChild(div);
                    });
                    list.classList.remove('hidden');
                } else list.classList.add('hidden');
            });
        }

        document.getElementById('fire-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const now = new Date();
            const formData = {
                id: Date.now().toString(),
                code: document.getElementById('code').value.trim().toUpperCase(),
                productName: document.getElementById('productName').value.trim(),
                unitType: document.getElementById('unitType').value,
                amount: document.getElementById('amount').value,
                unitPrice: document.getElementById('unitPrice').value,
                kdv: document.getElementById('kdv').value,
                category: document.getElementById('category').value,
                fullDate: now.toISOString().split('T')[0],
                time: now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                status: 'unregistered',
                history: []
            };

            formData.total = calculateTotal(formData.amount, formData.unitPrice, formData.kdv, formData.unitType);
            
            fires.push(formData);
            localStorage.setItem('fireRecords', JSON.stringify(fires));
            
            this.reset();
            render();
            
            // Ürün eklendiğinde bekleyen listesine kaydır
            document.getElementById('pending-container').scrollIntoView({ behavior: 'smooth' });
        });

        function registerAll() {
            fires.forEach(item => {
                if(item.status === 'unregistered') {
                    const existing = fires.find(r => r.status === 'registered' && r.code === item.code && r.category === item.category);
                    const hEntry = { date: new Date().toLocaleDateString('tr-TR'), time: item.time, amount: item.amount, unitType: item.unitType, total: item.total };
                    
                    if (existing) {
                        existing.amount = (parseFloat(existing.amount) + parseFloat(item.amount)).toFixed(3);
                        existing.total = (parseFloat(existing.total) + parseFloat(item.total)).toFixed(2);
                        existing.history.push(hEntry);
                        item.status = 'to_delete';
                    } else {
                        item.status = 'registered';
                        item.history = [hEntry];
                    }
                }
            });
            fires = fires.filter(f => f.status !== 'to_delete');
            localStorage.setItem('fireRecords', JSON.stringify(fires));
            render();
        }

        function render() {
            const unregistered = fires.filter(f => f.status === 'unregistered');
            const registered = fires.filter(f => f.status === 'registered');

            // 1. BEKLEYEN LİSTESİ
            const listDiv = document.getElementById('unregistered-list');
            if (unregistered.length === 0) {
                listDiv.innerHTML = `<div class="p-8 text-center border-2 border-dashed border-gray-200 rounded-3xl text-gray-300 font-bold text-xs uppercase">Bekleyen ürün yok</div>`;
                document.getElementById('register-all-btn').classList.add('hidden');
                document.getElementById('pending-analysis').classList.add('hidden');
            } else {
                listDiv.innerHTML = unregistered.map(item => `
                    <div class="bg-white p-4 rounded-3xl border border-gray-100 flex justify-between items-center shadow-sm animate-in">
                        <div>
                            <span class="text-[7px] font-black text-orange-500 bg-orange-50 px-2 py-0.5 rounded uppercase">${item.category}</span>
                            <h3 class="font-black text-gray-800 text-xs mt-1 uppercase">${item.productName}</h3>
                            <p class="text-[9px] text-gray-400 font-bold">${item.amount} ${item.unitType === 'gram' ? 'Kg' : 'Ad'} • ${item.time}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-sm text-gray-900">${item.total}₺</p>
                            <button onclick="deleteRecord('${item.id}')" class="text-[10px] text-red-300 font-black uppercase">SİL</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('register-all-btn').classList.remove('hidden');
                document.getElementById('pending-analysis').classList.remove('hidden');
            }

            // BEKLEYEN ANALİZ
            const pCatTotals = {};
            unregistered.forEach(i => pCatTotals[i.category] = (pCatTotals[i.category] || 0) + parseFloat(i.total));
            document.getElementById('unregistered-category-stats').innerHTML = Object.entries(pCatTotals).map(([cat, val]) => `
                <div class="bg-white p-3 rounded-2xl flex justify-between items-center border border-orange-100 shadow-sm">
                    <span class="text-[8px] font-black text-orange-900 uppercase tracking-tighter">${cat}</span>
                    <span class="text-xs font-black text-orange-600">${val.toFixed(2)}₺</span>
                </div>
            `).join('');

            document.getElementById('unregistered-total').innerText = unregistered.reduce((a,b) => a + parseFloat(b.total), 0).toFixed(2) + '₺';

            // 2. ARŞİV LİSTESİ
            let filteredReg = registered;
            const sDate = document.getElementById('start-date').value;
            const eDate = document.getElementById('end-date').value;
            if (currentFilter === 'today') filteredReg = registered.filter(f => f.fullDate === new Date().toISOString().split('T')[0]);
            else if (currentFilter === 'range' && sDate && eDate) filteredReg = registered.filter(f => f.fullDate >= sDate && f.fullDate <= eDate);

            document.getElementById('archive-section').style.display = registered.length > 0 ? 'block' : 'none';
            document.getElementById('registered-list').innerHTML = filteredReg.map(item => `
                <div onclick="toggleAccordion('${item.id}')" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm cursor-pointer mb-2">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[7px] font-black text-gray-300 uppercase">${item.code}</span>
                            <p class="font-black text-gray-700 text-xs uppercase">${item.productName}</p>
                        </div>
                        <span class="font-black text-gray-900 text-xs">${item.total}₺</span>
                    </div>
                    <div id="acc-${item.id}" class="hidden mt-3 pt-3 border-t border-dashed border-gray-100 space-y-2">
                        ${item.history.map(h => `<div class="flex justify-between text-[9px] font-bold text-gray-400"><span>${h.date}</span><span>${h.amount}</span><span>${h.total}₺</span></div>`).join('')}
                    </div>
                </div>
            `).join('');

            // ARŞİV ANALİZ
            const rCatTotals = {};
            filteredReg.forEach(i => rCatTotals[i.category] = (rCatTotals[i.category] || 0) + parseFloat(i.total));
            const rTotal = Object.values(rCatTotals).reduce((a,b) => a + b, 0);
            document.getElementById('archive-total').innerText = rTotal.toFixed(2) + '₺';

            const sorted = Object.entries(rCatTotals).sort((a,b) => b[1]-a[1]);
            const max = sorted.length > 0 ? sorted[0][1] : 1;
            document.getElementById('chart-container').innerHTML = sorted.map(([cat, val]) => `
                <div class="space-y-1">
                    <div class="flex justify-between text-[9px] font-black uppercase text-slate-500"><span>${cat}</span><span class="text-white">${val.toFixed(2)}₺</span></div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-full rounded-full bar-transition shadow-[0_0_8px_rgba(59,130,246,0.5)]" style="width: ${(val/max)*100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function deleteRecord(id) { if(confirm("Kayıt silinecek?")) { fires = fires.filter(f => f.id !== id); localStorage.setItem('fireRecords', JSON.stringify(fires)); render(); } }
        function toggleAccordion(id) { document.getElementById(`acc-${id}`).classList.toggle('hidden'); }
        function setFilter(f) { currentFilter = f; render(); }
        function resetSystem() { if(prompt("2407?") === "2407") { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
