<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atatürk Cd. Fire Takip Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .autocomplete-items { position: absolute; border: 1px solid #e5e7eb; z-index: 99; top: 100%; left: 0; right: 0; background: white; border-radius: 1rem; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .autocomplete-item { padding: 12px; cursor: pointer; font-size: 13px; font-weight: 700; border-bottom: 1px solid #f3f4f6; }
        .autocomplete-item:hover { background-color: #f9fafb; color: #3b82f6; }
        .bar-transition { transition: width 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-20">

    <div id="app" class="max-w-xl mx-auto p-4 md:p-6 space-y-6">
        <div class="flex justify-between items-start px-2">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 uppercase leading-none">ATATÜRK CD.</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mt-1">Gelişmiş Analiz Sistemi</p>
            </div>
            <div class="text-right">
                <span id="unregistered-total" class="text-2xl font-black text-orange-600 tabular-nums">0.00₺</span>
                <span class="text-[9px] font-black text-gray-400 uppercase block">Bekleyen Toplam</span>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 p-6 relative">
            <form id="fire-form" class="space-y-3" autocomplete="off">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-2 relative">
                    <div class="relative">
                        <input type="text" id="productName" placeholder="Ürün Adı" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500 transition-all" required>
                        <div id="autocomplete-list" class="autocomplete-items hidden"></div>
                    </div>
                    <input type="text" id="code" placeholder="Kod" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500 transition-all" required>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <select id="unitType" class="bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                        <option value="gram">KG / GR</option>
                        <option value="Adet">ADET</option>
                    </select>
                    <input type="number" id="amount" step="0.001" inputmode="decimal" placeholder="Miktar" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-bold" required>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <input type="number" step="0.01" inputmode="decimal" id="unitPrice" placeholder="Birim Fiyat" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-black text-blue-600" required>
                    <select id="kdv" class="bg-gray-50 p-4 rounded-2xl font-black text-orange-600 outline-none">
                        <option value="1">%1</option>
                        <option value="10">%10</option>
                        <option value="20">%20</option>
                    </select>
                </div>

                <select id="category" class="w-full bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                    <option value="Kırmızı Et">Kırmızı Et</option>
                    <option value="Tavuk">Tavuk</option>
                    <option value="SKT">SKT Ürün</option>
                    <option value="Mağaza">Mağaza</option>
                    <option value="Spot">Spot</option>
                    <option value="Meyve Sebze">Meyve Sebze</option>
                </select>

                <button type="submit" id="submit-btn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-lg uppercase text-sm transition-all">
                    LİSTEYE EKLE
                </button>
                <button type="button" id="cancel-btn" class="hidden w-full py-2 text-[10px] font-black text-gray-400 uppercase">VAZGEÇ</button>
            </form>
        </div>

        <div id="pending-section" class="space-y-4">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2">Bekleyen Kayıtlar</h2>
            <div id="unregistered-list" class="space-y-3"></div>
            <div id="register-all-container" class="hidden bg-orange-500 rounded-3xl p-1 shadow-lg shadow-orange-200">
                <button onclick="registerAll()" class="w-full py-4 text-white font-black text-sm tracking-widest uppercase flex justify-center items-center gap-3">
                    ARŞİVE GÖNDER <span id="pending-count" class="bg-white text-orange-600 px-2 py-0.5 rounded-lg text-[10px]">0</span>
                </button>
            </div>
        </div>

        <div id="archive-section" class="pt-6 space-y-4 hidden border-t border-gray-100">
            <div class="flex flex-col gap-3 px-2">
                <div class="flex justify-between items-center">
                    <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Onaylı Arşiv</h2>
                    <div class="flex bg-gray-100 p-1 rounded-xl text-[9px] font-black">
                        <button onclick="setFilter('all')" id="filter-all" class="px-3 py-1.5 rounded-lg bg-white shadow-sm">HEPSİ</button>
                        <button onclick="setFilter('today')" id="filter-today" class="px-3 py-1.5 rounded-lg text-gray-400">BUGÜN</button>
                    </div>
                </div>
                <input type="text" id="search-archive" placeholder="Ürün veya kod ara..." class="w-full bg-white border border-gray-200 rounded-2xl px-4 py-3 text-xs font-bold outline-none focus:border-blue-400 transition-all">
            </div>
            
            <div id="registered-list" class="space-y-2"></div>

            <div class="bg-slate-900 rounded-[2.5rem] p-6 text-white space-y-6 shadow-2xl">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Genel Toplam</p>
                        <h3 id="archive-total" class="text-3xl font-black tabular-nums leading-none">0.00₺</h3>
                    </div>
                </div>
                
                <div id="chart-container" class="space-y-4 pt-2">
                    </div>
            </div>
        </div>

        <footer class="py-12 text-center opacity-20 hover:opacity-100 transition-opacity">
            <p class="text-[8px] font-black text-gray-400 uppercase tracking-[0.5em] cursor-pointer" onclick="resetSystem()">SIFIRLA: 2407</p>
        </footer>
    </div>

    <script>
        let fires = JSON.parse(localStorage.getItem('fireRecords')) || [];
        let currentFilter = 'all'; // 'all' or 'today'
        let searchTerm = '';

        const form = document.getElementById('fire-form');
        const productNameInput = document.getElementById('productName');
        const autocompleteList = document.getElementById('autocomplete-list');

        function init() { render(); setupAutocomplete(); }

        function calculateTotal(amount, price, kdv, unit) {
            const amt = parseFloat(amount) || 0;
            const prc = parseFloat(price) || 0;
            const rate = parseFloat(kdv);
            const baseValue = unit === 'gram' ? (amt / 1000) * prc : amt * prc;
            return (baseValue / (1 + rate / 100)).toFixed(2);
        }

        // --- 1. Autocomplete (Hafıza) Mantığı ---
        function setupAutocomplete() {
            productNameInput.addEventListener('input', function() {
                const val = this.value.toLowerCase();
                autocompleteList.innerHTML = '';
                if (!val) { autocompleteList.classList.add('hidden'); return; }

                // Eşsiz ürün kütüphanesi oluştur
                const library = [];
                const seen = new Set();
                fires.forEach(f => {
                    const key = f.productName.toLowerCase();
                    if (!seen.has(key)) {
                        library.push(f);
                        seen.add(key);
                    }
                });

                const matches = library.filter(f => f.productName.toLowerCase().includes(val)).slice(0, 5);
                
                if (matches.length > 0) {
                    matches.forEach(match => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        div.innerHTML = `<span>${match.productName}</span> <span class="text-[10px] text-gray-400 float-right">${match.code}</span>`;
                        div.addEventListener('click', () => {
                            productNameInput.value = match.productName;
                            document.getElementById('code').value = match.code;
                            document.getElementById('unitPrice').value = match.unitPrice;
                            document.getElementById('kdv').value = match.kdv;
                            document.getElementById('category').value = match.category;
                            document.getElementById('unitType').value = match.unitType;
                            autocompleteList.classList.add('hidden');
                        });
                        autocompleteList.appendChild(div);
                    });
                    autocompleteList.classList.remove('hidden');
                } else {
                    autocompleteList.classList.add('hidden');
                }
            });

            document.addEventListener('click', (e) => {
                if (e.target !== productNameInput) autocompleteList.classList.add('hidden');
            });
        }

        // --- 4. Tarih Filtreleme Mantığı ---
        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('filter-all').className = filter === 'all' ? 'px-3 py-1.5 rounded-lg bg-white shadow-sm' : 'px-3 py-1.5 rounded-lg text-gray-400';
            document.getElementById('filter-today').className = filter === 'today' ? 'px-3 py-1.5 rounded-lg bg-white shadow-sm' : 'px-3 py-1.5 rounded-lg text-gray-400';
            render();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const formData = {
                code: document.getElementById('code').value.trim().toUpperCase(),
                productName: productNameInput.value.trim(),
                unitType: document.getElementById('unitType').value,
                amount: document.getElementById('amount').value,
                unitPrice: document.getElementById('unitPrice').value,
                kdv: document.getElementById('kdv').value,
                category: document.getElementById('category').value,
                fullDate: new Date().toISOString().split('T')[0] // Filtreleme için YYYY-MM-DD
            };

            const totalValue = calculateTotal(formData.amount, formData.unitPrice, formData.kdv, formData.unitType);

            if (editId) {
                const index = fires.findIndex(f => f.id === editId);
                if (index !== -1) fires[index] = { ...fires[index], ...formData, total: totalValue, timestamp: Date.now() };
                document.getElementById('edit-id').value = '';
            } else {
                fires.push({
                    id: Date.now().toString(),
                    ...formData,
                    total: totalValue,
                    date: new Date().toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit' }),
                    status: 'unregistered',
                    timestamp: Date.now(),
                    history: []
                });
            }
            saveAndRender();
            const lastCat = formData.category;
            form.reset();
            document.getElementById('category').value = lastCat;
        });

        function registerAll() {
            fires.filter(f => f.status === 'unregistered').forEach(item => {
                const existing = fires.find(r => r.status === 'registered' && r.code === item.code && r.category === item.category);
                if (existing) {
                    existing.amount = (parseFloat(existing.amount) + parseFloat(item.amount)).toFixed(3);
                    existing.total = (parseFloat(existing.total) + parseFloat(item.total)).toFixed(2);
                    existing.history.push({ date: item.date, amount: item.amount, unitType: item.unitType, total: item.total });
                    item.status = 'to_delete';
                } else {
                    item.status = 'registered';
                    item.history = [{ date: item.date, amount: item.amount, unitType: item.unitType, total: item.total }];
                }
            });
            fires = fires.filter(f => f.status !== 'to_delete');
            saveAndRender();
        }

        function deleteRecord(id) { if (confirm("Silinsin mi?")) { fires = fires.filter(f => f.id !== id); saveAndRender(); } }

        function saveAndRender() { localStorage.setItem('fireRecords', JSON.stringify(fires)); render(); }

        function render() {
            const unregistered = fires.filter(f => f.status === 'unregistered');
            const todayStr = new Date().toISOString().split('T')[0];
            
            let registered = fires.filter(f => f.status === 'registered');
            if (currentFilter === 'today') registered = registered.filter(f => f.fullDate === todayStr);
            if (searchTerm) registered = registered.filter(f => f.productName.toLowerCase().includes(searchTerm) || f.code.toLowerCase().includes(searchTerm));

            // Bekleyen Listesi
            document.getElementById('unregistered-list').innerHTML = unregistered.map(item => `
                <div class="bg-white p-4 rounded-3xl border border-gray-100 flex justify-between items-center shadow-sm animate-in">
                    <div>
                        <span class="text-[7px] font-black text-orange-500 bg-orange-50 px-2 py-0.5 rounded uppercase">${item.category}</span>
                        <h3 class="font-black text-gray-800 text-xs mt-1">${item.productName}</h3>
                        <p class="text-[9px] text-gray-400 font-bold">${item.amount} ${item.unitType === 'gram' ? 'Kg' : 'Ad'} x ${item.unitPrice}₺</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm text-gray-900 tabular-nums">${item.total}₺</p>
                        <button onclick="deleteRecord('${item.id}')" class="text-[10px] text-red-300 font-black uppercase mt-1">SİL</button>
                    </div>
                </div>
            `).join('');

            const uTotal = unregistered.reduce((acc, curr) => acc + parseFloat(curr.total), 0).toFixed(2);
            document.getElementById('unregistered-total').innerText = uTotal + '₺';
            document.getElementById('pending-count').innerText = unregistered.length;
            document.getElementById('register-all-container').style.display = unregistered.length > 0 ? 'block' : 'none';

            // Arşiv Listesi
            document.getElementById('archive-section').style.display = fires.some(f => f.status === 'registered') ? 'block' : 'none';
            document.getElementById('registered-list').innerHTML = registered.map(item => `
                <div onclick="toggleAccordion('${item.id}')" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm cursor-pointer animate-in">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[7px] font-black text-gray-300 uppercase">${item.code} • ${item.category}</span>
                            <p class="font-black text-gray-700 text-xs uppercase">${item.productName}</p>
                        </div>
                        <div class="text-right">
                            <span class="font-black text-gray-900 text-xs">${item.total}₺</span>
                            <p class="text-[8px] text-gray-400 font-bold uppercase">${item.amount} ${item.unitType === 'gram' ? 'Kg' : 'Ad'}</p>
                        </div>
                    </div>
                    <div id="acc-${item.id}" class="hidden mt-3 pt-3 border-t border-dashed border-gray-100 space-y-1">
                        ${item.history.map(h => `<div class="flex justify-between text-[8px] font-bold text-gray-400"><span>${h.date}</span><span>${h.amount} ${h.unitType === 'gram' ? 'Kg' : 'Ad'}</span><span>${h.total}₺</span></div>`).join('')}
                        <button onclick="event.stopPropagation(); deleteRecord('${item.id}')" class="w-full mt-2 text-[8px] text-red-400 font-black">KAYDI ARŞİVDEN SİL</button>
                    </div>
                </div>
            `).join('');

            // --- 3. Kategori Bar Grafik Mantığı ---
            const catTotals = {};
            const allRegistered = fires.filter(f => f.status === 'registered');
            allRegistered.forEach(i => catTotals[i.category] = (catTotals[i.category] || 0) + parseFloat(i.total));
            
            const rTotal = Object.values(catTotals).reduce((a, b) => a + b, 0);
            document.getElementById('archive-total').innerText = rTotal.toFixed(2) + '₺';

            const sortedCats = Object.entries(catTotals).sort((a,b) => b[1] - a[1]);
            const maxVal = sortedCats.length > 0 ? sortedCats[0][1] : 1;

            document.getElementById('chart-container').innerHTML = sortedCats.map(([cat, val]) => {
                const percentage = (val / maxVal) * 100;
                return `
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black uppercase tracking-widest text-slate-400">
                            <span>${cat}</span>
                            <span class="text-white">${val.toFixed(2)}₺</span>
                        </div>
                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full rounded-full bar-transition" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleAccordion(id) { document.getElementById(`acc-${id}`).classList.toggle('hidden'); }
        document.getElementById('search-archive').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); render(); });

        function resetSystem() { if (prompt("Sıfırla?") === "2407") { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
