<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atatürk Cd. Fire Takip V8.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        #reader { width: 100%; border: none !important; }
        #reader video { border-radius: 1.5rem; }
        #reader__dashboard_section_swaplink, #reader__camera_selection { display: none !important; }
        .animate-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .detail-row { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out; opacity: 0; }
        .open .detail-row { max-height: 1000px; opacity: 1; margin-top: 10px; }
        .can-open { cursor: pointer !important; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-32">

    <div class="max-w-xl mx-auto p-4 md:p-6 space-y-4">
        <div class="flex justify-between items-end px-2">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">ATATÜRK CD.</h1>
                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Full Kontrol v8.1</p>
            </div>
            <div class="text-right">
                <span id="unregistered-total" class="text-xl font-black text-orange-600">0.00₺</span>
                <p class="text-[7px] font-black text-gray-400 uppercase">BEKLEYEN</p>
            </div>
        </div>

        <div id="unreg-group-summary" class="flex flex-wrap gap-2 px-2"></div>

        <div id="scanner-container" class="hidden bg-white rounded-[2rem] shadow-2xl p-2 border-2 border-blue-500 animate-in">
            <div id="reader"></div>
            <button onclick="stopScanner()" class="w-full py-2 text-[10px] font-black text-red-500 uppercase">Kapat</button>
        </div>
        
        <button id="start-scan-btn" onclick="startScanner()" class="w-full py-3 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg flex items-center justify-center gap-2">
            <span>📷</span> BARKOD TARAT
        </button>

        <div class="bg-white rounded-[2.5rem] shadow-xl p-6 border border-gray-100">
            <form id="fire-form" class="space-y-3" autocomplete="off">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="old-price">
                <div class="grid grid-cols-2 gap-2">
                    <div class="relative">
                        <input type="text" id="productName" list="prevProducts" placeholder="Ürün Adı" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required onchange="autoFill(this.value)">
                        <datalist id="prevProducts"></datalist>
                    </div>
                    <input type="text" id="code" placeholder="Kod" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <select id="unitType" class="bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                        <option value="gram">GRAM</option>
                        <option value="Adet">ADET</option>
                    </select>
                    <input type="number" id="amount" step="any" placeholder="Miktar" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" step="0.01" id="unitPrice" placeholder="Birim Fiyat" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-black text-blue-600 border-2 border-transparent focus:border-blue-500" required>
                    <select id="kdv" class="bg-gray-50 p-4 rounded-2xl font-black text-orange-600 outline-none"><option value="1">%1</option><option value="10">%10</option><option value="20">%20</option></select>
                </div>
                <select id="category" class="w-full bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                    <option value="Mağaza">Mağaza</option><option value="Kırmızı Et">Kırmızı Et</option><option value="Tavuk">Tavuk</option><option value="SKT">SKT Ürün</option><option value="Meyve Sebze">Meyve Sebze</option><option value="Spot">Spot</option>
                </select>
                <div class="flex gap-2">
                    <button type="submit" id="submit-btn" class="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black tracking-widest uppercase text-sm shadow-lg">LİSTEYE EKLE</button>
                    <button type="button" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden px-6 bg-red-100 text-red-600 rounded-2xl font-bold text-xs uppercase">Vazgeç</button>
                </div>
            </form>
        </div>

        <div id="unregistered-list" class="space-y-2"></div>
        <button id="register-all-btn" onclick="registerAll()" class="hidden w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-sm shadow-xl uppercase">Hepsini Onayla</button>
        
        <div class="pt-6 border-t border-gray-200 space-y-3">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2">Arşiv Geçmişi</h2>
            <input type="text" id="archiveSearch" oninput="render()" placeholder="Ürün veya kod ara..." class="w-full bg-white p-3 rounded-xl text-xs font-bold outline-none border border-gray-200">
            <div id="reg-group-summary" class="flex flex-wrap gap-2 px-1"></div>
        </div>

        <div id="registered-list" class="space-y-2"></div>
        
        <div class="bg-white rounded-3xl p-5 border border-gray-100 shadow-sm space-y-3">
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Grup Bazlı Fire Dağılımı</p>
            <div id="group-charts" class="space-y-2"></div>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-6 text-white shadow-2xl">
            <p class="text-[8px] font-black text-slate-400 uppercase">TOPLAM ARŞİV</p>
            <h3 id="archive-total" class="text-3xl font-black">0.00₺</h3>
        </div>
    </div>

    <script>
        let fires = JSON.parse(localStorage.getItem('fireRecords')) || [];
        let html5QrCode;

        const categoryColors = {
            "Mağaza": "bg-blue-500", "Kırmızı Et": "bg-red-500", "Tavuk": "bg-orange-400",
            "SKT": "bg-purple-500", "Meyve Sebze": "bg-green-500", "Spot": "bg-amber-600"
        };

        // Rakamları sıfırdan arındırıp gösteren yardımcı fonksiyon
        const cleanNum = (num) => parseFloat(parseFloat(num).toFixed(3));

        function updateDatalist() {
            const list = document.getElementById('prevProducts');
            const uniqueProducts = [...new Map(fires.map(item => [item.productName, item])).values()];
            list.innerHTML = uniqueProducts.map(i => `<option value="${i.productName}">`).join('');
        }

        function autoFill(val) {
            const product = fires.find(f => f.productName === val);
            if(product) {
                document.getElementById('code').value = product.code;
                document.getElementById('unitPrice').value = product.unitPrice;
                document.getElementById('old-price').value = product.unitPrice;
                document.getElementById('category').value = product.category;
                document.getElementById('kdv').value = product.kdv;
                document.getElementById('unitType').value = product.unitType;
                document.getElementById('amount').focus();
            }
        }

        async function startScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            document.getElementById('start-scan-btn').classList.add('hidden');
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                    document.getElementById('code').value = text.trim();
                    const item = fires.find(f => f.code === text.trim());
                    if(item) {
                        document.getElementById('productName').value = item.productName;
                        autoFill(item.productName);
                    }
                    stopScanner();
                });
            } catch (err) { stopScanner(); }
        }

        async function stopScanner() {
            if (html5QrCode) await html5QrCode.stop();
            document.getElementById('scanner-container').classList.add('hidden');
            document.getElementById('start-scan-btn').classList.remove('hidden');
        }

        function renderCharts(items) {
            const total = items.reduce((acc, curr) => acc + parseFloat(curr.total), 0);
            const summary = items.reduce((acc, curr) => {
                acc[curr.category] = (acc[curr.category] || 0) + parseFloat(curr.total);
                return acc;
            }, {});

            document.getElementById('group-charts').innerHTML = Object.entries(summary).map(([cat, val]) => {
                const percent = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
                return `
                    <div class="space-y-1">
                        <div class="flex justify-between text-[10px] font-bold uppercase">
                            <span>${cat}</span>
                            <span class="text-slate-400">${val.toFixed(2)}₺ (%${percent})</span>
                        </div>
                        <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                            <div class="progress-bar ${categoryColors[cat] || 'bg-slate-400'} h-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function render() {
            updateDatalist();
            const unreg = fires.filter(f => f.status === 'unregistered');
            const search = document.getElementById('archiveSearch').value.toLowerCase().trim();
            const allReg = fires.filter(f => f.status === 'registered');

            const groupedReg = allReg.reduce((acc, curr) => {
                if (!acc[curr.code]) {
                    acc[curr.code] = { ...curr, historyItems: [curr], total: parseFloat(curr.total) };
                } else {
                    acc[curr.code].historyItems.push(curr);
                    acc[curr.code].total += parseFloat(curr.total);
                    acc[curr.code].amount = cleanNum(parseFloat(acc[curr.code].amount) + parseFloat(curr.amount));
                }
                return acc;
            }, {});

            const filteredReg = Object.values(groupedReg).filter(i => 
                i.productName.toLowerCase().includes(search) || i.code.includes(search)
            );

            renderCharts(allReg);

            const listMapper = (item, isArchive = false) => {
                const isMulti = isArchive && item.historyItems.length > 1;
                const displayAmount = item.unitType === 'gram' 
                    ? cleanNum(item.amount * 1000) + ' gr' 
                    : cleanNum(item.amount) + ' ad';

                return `
                <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm animate-in ${isMulti || !isArchive ? 'can-open' : ''}" 
                     onclick="${(isMulti || !isArchive) ? "this.classList.toggle('open')" : ""}">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[8px] font-black text-blue-500 block">#${item.code}</span>
                            <div class="text-[11px] font-black uppercase flex items-center gap-1">
                                ${item.productName} ${isMulti ? '<span class="text-blue-500 text-[8px]">↓</span>' : ''}
                            </div>
                            <span class="text-[9px] text-gray-400 font-bold">${displayAmount}</span>
                        </div>
                        <div class="text-right flex items-center gap-2">
                            <span class="font-black text-sm">${parseFloat(item.total).toFixed(2)}₺</span>
                            ${!isArchive ? `<button onclick="event.stopPropagation(); editItem('${item.id}')" class="p-1">✏️</button>` : ''}
                            ${!isArchive ? `<button onclick="event.stopPropagation(); deleteRecord('${item.id}')" class="p-1 text-red-200">✕</button>` : ''}
                        </div>
                    </div>
                    <div class="detail-row text-[9px] border-t pt-2 space-y-1">
                        <div class="flex justify-between font-bold text-gray-500 uppercase">
                            <span>Birim: ${item.unitPrice}₺</span>
                            <span>KDV: %${item.kdv}</span>
                            <span>${item.category}</span>
                        </div>
                        ${item.priceChange ? `<div class="text-red-500 font-black italic">⚠️ ${item.priceChange}</div>` : ''}
                        ${isArchive && isMulti ? `
                            <div class="mt-2 space-y-1">
                                ${item.historyItems.map(h => `
                                    <div class="flex justify-between text-[8px] border-b border-gray-100 pb-1">
                                        <span class="text-gray-400">${h.fullDate}</span>
                                        <span>${h.unitType==='gram' ? cleanNum(h.amount*1000)+'gr' : cleanNum(h.amount)+'ad'} x ${h.unitPrice}₺</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>`;
            };

            document.getElementById('unregistered-list').innerHTML = unreg.map(i => listMapper(i, false)).join('');
            document.getElementById('registered-list').innerHTML = filteredReg.map(i => listMapper(i, true)).join('');

            document.getElementById('unregistered-total').innerText = unreg.reduce((a, b) => a + parseFloat(b.total), 0).toFixed(2) + '₺';
            document.getElementById('archive-total').innerText = allReg.reduce((a, b) => a + parseFloat(b.total), 0).toFixed(2) + '₺';
            document.getElementById('register-all-btn').classList.toggle('hidden', unreg.length === 0);
        }

        document.getElementById('fire-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const now = new Date();
            const code = document.getElementById('code').value;
            const unitType = document.getElementById('unitType').value;
            let rawAmount = parseFloat(document.getElementById('amount').value);
            const price = parseFloat(document.getElementById('unitPrice').value);
            const oldPrice = parseFloat(document.getElementById('old-price').value);
            
            let finalAmount = unitType === 'gram' ? rawAmount / 1000 : rawAmount;
            const total = (finalAmount * price).toFixed(2);
            
            let priceChangeNote = (oldPrice && oldPrice !== price) ? `FİYAT DEĞİŞTİ: ${oldPrice}₺ ➔ ${price}₺` : "";

            const existingIndex = fires.findIndex(f => f.code === code && f.status === 'unregistered' && !editId);
            
            if(existingIndex !== -1) {
                const old = fires[existingIndex];
                fires[existingIndex].amount = cleanNum(parseFloat(old.amount) + finalAmount);
                fires[existingIndex].total = (parseFloat(old.total) + parseFloat(total)).toFixed(2);
                if(priceChangeNote) fires[existingIndex].priceChange = priceChangeNote;
            } else {
                const item = {
                    id: editId || Date.now().toString(),
                    code: code,
                    productName: document.getElementById('productName').value,
                    unitType: unitType,
                    amount: cleanNum(finalAmount),
                    unitPrice: price,
                    kdv: document.getElementById('kdv').value,
                    category: document.getElementById('category').value,
                    fullDate: now.toLocaleDateString('tr-TR'),
                    status: 'unregistered',
                    total: total,
                    priceChange: priceChangeNote
                };

                if(editId) {
                    const idx = fires.findIndex(f => f.id === editId);
                    item.status = fires[idx].status;
                    fires[idx] = item;
                    cancelEdit();
                } else {
                    fires.unshift(item);
                }
            }
            
            localStorage.setItem('fireRecords', JSON.stringify(fires));
            render();
            
            const tempCat = document.getElementById('category').value;
            const tempKdv = document.getElementById('kdv').value;
            this.reset();
            document.getElementById('category').value = tempCat;
            document.getElementById('kdv').value = tempKdv;
        });

        function editItem(id) {
            const i = fires.find(f => f.id === id);
            document.getElementById('edit-id').value = i.id;
            document.getElementById('productName').value = i.productName;
            document.getElementById('code').value = i.code;
            document.getElementById('amount').value = i.unitType === 'gram' ? cleanNum(i.amount * 1000) : cleanNum(i.amount);
            document.getElementById('unitPrice').value = i.unitPrice;
            document.getElementById('old-price').value = i.unitPrice;
            document.getElementById('category').value = i.category;
            document.getElementById('unitType').value = i.unitType;
            document.getElementById('kdv').value = i.kdv;
            document.getElementById('submit-btn').innerText = "GÜNCELLE";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = '';
            document.getElementById('fire-form').reset();
            document.getElementById('submit-btn').innerText = "LİSTEYE EKLE";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        function deleteRecord(id) {
            if(confirm('Silinsin mi?')) {
                fires = fires.filter(f => f.id !== id);
                localStorage.setItem('fireRecords', JSON.stringify(fires));
                render();
            }
        }

        function registerAll() {
            fires = fires.map(f => ({...f, status: 'registered'}));
            localStorage.setItem('fireRecords', JSON.stringify(fires));
            render();
        }

        window.onload = render;
    </script>
</body>
</html>
