<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atatürk Cd. Fire Takip V7.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #reader { width: 100%; border: none !important; }
        #reader video { border-radius: 1.5rem; }
        /* Kütüphanenin kendi butonlarını gizle */
        #reader__dashboard_section_swaplink, #reader__camera_selection { display: none !important; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <div class="max-w-xl mx-auto p-4 md:p-6 space-y-4">
        <div class="flex justify-between items-end px-2">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">ATATÜRK CD.</h1>
                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Kompakt Tarayıcı v7.1</p>
            </div>
            <div class="text-right">
                <span id="unregistered-total" class="text-xl font-black text-orange-600">0.00₺</span>
                <p class="text-[7px] font-black text-gray-400 uppercase">BEKLEYEN</p>
            </div>
        </div>

        <div id="scanner-container" class="hidden bg-white rounded-[2rem] shadow-2xl p-2 border-2 border-blue-500 animate-in">
            <div id="reader"></div>
            <button onclick="stopScanner()" class="w-full py-2 text-[10px] font-black text-red-500 uppercase">Tarayıcıyı Kapat</button>
        </div>
        
        <button id="start-scan-btn" onclick="startScanner()" class="w-full py-3 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
            <span>📷</span> BARKOD / KAREKOD TARAT
        </button>

        <div class="bg-white rounded-[2.5rem] shadow-xl p-6 border border-gray-100">
            <form id="fire-form" class="space-y-3" autocomplete="off">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="productName" placeholder="Ürün Adı" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                    <input type="text" id="code" placeholder="Kod" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <select id="unitType" class="bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none"><option value="gram">KG/GR</option><option value="Adet">ADET</option></select>
                    <input type="number" id="amount" step="0.001" placeholder="Miktar" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500" required>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" step="0.01" id="unitPrice" placeholder="Birim Fiyat" class="col-span-2 bg-gray-50 p-4 rounded-2xl outline-none font-black text-blue-600 border-2 border-transparent focus:border-blue-500" required>
                    <select id="kdv" class="bg-gray-50 p-4 rounded-2xl font-black text-orange-600 outline-none"><option value="1">%1</option><option value="10">%10</option><option value="20">%20</option></select>
                </div>
                <select id="category" class="w-full bg-gray-50 p-4 rounded-2xl font-bold text-sm outline-none">
                    <option value="Mağaza">Mağaza</option><option value="Kırmızı Et">Kırmızı Et</option><option value="Tavuk">Tavuk</option><option value="SKT">SKT Ürün</option><option value="Meyve Sebze">Meyve Sebze</option>
                </select>
                <button type="submit" id="submit-btn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black tracking-widest uppercase text-sm">LİSTEYE EKLE</button>
            </form>
        </div>

        <div id="unregistered-list" class="space-y-2"></div>
        <button id="register-all-btn" onclick="registerAll()" class="hidden w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-sm uppercase shadow-xl">HEPSİNİ ONAYLA</button>
        
        <div id="registered-list" class="space-y-2 pt-4 border-t border-gray-200"></div>
        
        <div class="bg-slate-900 rounded-[2.5rem] p-6 text-white">
            <p class="text-[8px] font-black text-slate-400 uppercase">ARŞİV TOPLAM</p>
            <h3 id="archive-total" class="text-2xl font-black">0.00₺</h3>
        </div>
    </div>

    <script>
        let fires = JSON.parse(localStorage.getItem('fireRecords')) || [];
        let html5QrCode;

        // --- KAMERA YÖNETİMİ ---
        async function startScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            document.getElementById('start-scan-btn').classList.add('hidden');
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            try {
                // 'environment' parametresi otomatik olarak ARKA kamerayı seçer
                await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                    document.getElementById('code').value = decodedText.trim();
                    autoFill(decodedText.trim());
                    stopScanner(); // Okuyunca kapat
                    if (navigator.vibrate) navigator.vibrate(100);
                });
            } catch (err) {
                alert("Kamera başlatılamadı. İzin verdiğinizden emin olun.");
                stopScanner();
            }
        }

        async function stopScanner() {
            if (html5QrCode) {
                await html5QrCode.stop();
                html5QrCode = null;
            }
            document.getElementById('scanner-container').classList.add('hidden');
            document.getElementById('start-scan-btn').classList.remove('hidden');
        }

        function autoFill(scannedCode) {
            const item = fires.find(f => f.code === scannedCode);
            if (item) {
                document.getElementById('productName').value = item.productName;
                document.getElementById('unitPrice').value = item.unitPrice;
                document.getElementById('kdv').value = item.kdv;
                document.getElementById('category').value = item.category;
                document.getElementById('unitType').value = item.unitType;
                document.getElementById('amount').focus();
            }
        }

        // --- TEMEL SİSTEM ---
        function render() {
            const unreg = fires.filter(f => f.status === 'unregistered');
            const reg = fires.filter(f => f.status === 'registered');

            document.getElementById('unregistered-list').innerHTML = unreg.map(i => `
                <div class="bg-white p-3 rounded-2xl border border-gray-100 flex justify-between items-center animate-in shadow-sm">
                    <div class="text-[11px] font-bold uppercase">${i.productName}<br><span class="text-[8px] text-gray-400">${i.amount}${i.unitType==='gram'?'kg':'ad'} • ${i.unitPrice}₺/Brm</span></div>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-sm">${i.total}₺</span>
                        <button onclick="deleteRecord('${i.id}')" class="text-red-300 text-xs font-bold">✕</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('registered-list').innerHTML = reg.slice(0, 10).map(i => `
                <div class="bg-white/50 p-2 rounded-xl flex justify-between items-center text-[10px] opacity-60">
                    <span class="font-bold">${i.productName}</span>
                    <span class="font-black">${i.total}₺</span>
                </div>
            `).join('');

            document.getElementById('unregistered-total').innerText = unreg.reduce((a, b) => a + parseFloat(b.total), 0).toFixed(2) + '₺';
            document.getElementById('archive-total').innerText = reg.reduce((a, b) => a + parseFloat(b.total), 0).toFixed(2) + '₺';
            document.getElementById('register-all-btn').classList.toggle('hidden', unreg.length === 0);
        }

        document.getElementById('fire-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const now = new Date();
            const item = {
                id: Date.now().toString(),
                code: document.getElementById('code').value,
                productName: document.getElementById('productName').value,
                unitType: document.getElementById('unitType').value,
                amount: document.getElementById('amount').value,
                unitPrice: document.getElementById('unitPrice').value,
                kdv: document.getElementById('kdv').value,
                category: document.getElementById('category').value,
                status: 'unregistered',
                total: ((parseFloat(document.getElementById('amount').value) * parseFloat(document.getElementById('unitPrice').value) / (document.getElementById('unitType').value === 'gram' ? 1000 : 1)) / (1 + parseInt(document.getElementById('kdv').value)/100)).toFixed(2)
            };
            fires.unshift(item);
            localStorage.setItem('fireRecords', JSON.stringify(fires));
            render();
            this.reset();
        });

        function registerAll() { fires = fires.map(f => ({...f, status: 'registered'})); localStorage.setItem('fireRecords', JSON.stringify(fires)); render(); }
        function deleteRecord(id) { fires = fires.filter(f => f.id !== id); localStorage.setItem('fireRecords', JSON.stringify(fires)); render(); }
        
        window.onload = render;
    </script>
</body>
</html>
